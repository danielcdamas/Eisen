name: Deploy PWA to GitHub Pages

# Publica o app (HTML/CSS/JS estático) no GitHub Pages.
# Roda ao integrar na branch padrão (main) ou manualmente (workflow_dispatch).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Garante uma publicação por vez, sem cancelar uma já em andamento.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Pages (habilita se necessário)
        uses: actions/configure-pages@v5

      - name: Empacotar o site (raiz do repositório)
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Publicar no Pages
        id: deployment
        uses: actions/deploy-pages@v4
